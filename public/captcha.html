<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AiTradeX Human Verification</title>

    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer>
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #f5f7fb;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            width: 380px;
            max-width: 90%;
            background: #fff;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .12);
            text-align: center;
        }

        h2 {
            margin-bottom: 10px;
        }

        p {
            color: #666;
            margin-bottom: 25px;
        }

        .cf-turnstile {
            display: flex;
            justify-content: center;
            margin-bottom: 25px;
        }

        button {
            width: 100%;
            height: 50px;
            border: none;
            border-radius: 12px;
            background: #f92902;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:disabled {
            background: #999;
            cursor: not-allowed;
        }
    </style>

</head>

<body>

    <div class="card">

        <h2>Human Verification</h2>

        <p>Please verify that you're human before continuing.</p>

        <form id="captchaForm">

            <div class="cf-turnstile" data-sitekey="0x4AAAAAAD8FzlvcdLuU71es" data-callback="captchaSuccess"
                data-expired-callback="captchaExpired" data-error-callback="captchaError">
            </div>

            <button id="continueBtn" type="submit" disabled>
                Continue
            </button>

        </form>

    </div>

    <script>
        let token = "";
        let isSubmitting = false;

        // Read email from URL
        const params = new URLSearchParams(window.location.search);
        const email = params.get("email");

        const continueBtn = document.getElementById("continueBtn");

        // Success callback
        function captchaSuccess(turnstileToken) {
            token = turnstileToken;
            continueBtn.disabled = false;
        }

        // Expired callback
        function captchaExpired() {
            token = "";
            continueBtn.disabled = true;
            alert("Captcha expired. Please verify again.");
        }

        // Error callback
        function captchaError() {
            token = "";
            continueBtn.disabled = true;
            alert("Captcha verification failed.");
        }

        document
            .getElementById("captchaForm")
            .addEventListener("submit", async function (e) {

                e.preventDefault();

                if (isSubmitting) return;

                if (!email) {
                    alert("Email parameter missing.");
                    return;
                }

                if (!token) {
                    alert("Captcha not completed.");
                    return;
                }

                isSubmitting = true;
                continueBtn.disabled = true;
                continueBtn.innerText = "Verifying...";

                try {

                    const response = await fetch("/api/auth/verify-turnstile", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            email,
                            token
                        })
                    });

                    const result = await response.json();

                    if (result.success) {

                        // Return to Flutter
                        window.location.replace("aitradex://captcha-success");

                    } else {

                        isSubmitting = false;
                        continueBtn.disabled = false;
                        continueBtn.innerText = "Continue";

                        alert(result.message || "Verification failed.");
                    }

                } catch (err) {

                    console.error(err);

                    isSubmitting = false;
                    continueBtn.disabled = false;
                    continueBtn.innerText = "Continue";

                    alert("Server Error");

                }

            });
    </script>

</body>

</html>
