<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>AiTradeX Verification</title>

    <script
        src="https://challenges.cloudflare.com/turnstile/v0/api.js"
        async
        defer>
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #f5f7fb;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            width: 380px;
            max-width: 90%;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,.12);
            text-align: center;
        }

        h2 {
            margin-bottom: 12px;
        }

        p {
            color: #666;
            margin-bottom: 25px;
        }

        .cf-turnstile {
            display: flex;
            justify-content: center;
            margin-bottom: 25px;
        }

        button {
            width: 100%;
            height: 50px;
            border: none;
            border-radius: 12px;
            background: #f92902;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:disabled {
            background: grey;
            cursor: not-allowed;
        }
    </style>
</head>

<body>

<div class="card">

    <h2>Human Verification</h2>

    <p>Please verify that you're human before continuing.</p>

    <form id="captchaForm">

        <div
            class="cf-turnstile"
            data-sitekey="0x4AAAAAAD8FzlvcdLuU71es"
            data-callback="captchaSuccess">
        </div>

        <button
            id="continueBtn"
            disabled>
            Continue
        </button>

    </form>

</div>

<script>

let token = "";

function captchaSuccess(turnstileToken){
    token = turnstileToken;

    document.getElementById("continueBtn").disabled = false;
}

document
.getElementById("captchaForm")
.addEventListener("submit", async function(e){

    e.preventDefault();

    const response = await fetch("/api/auth/verify-turnstile",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({
            token:token
        })

    });

    const result = await response.json();

    if(result.success){

        window.location.href =
        "aitradex://captcha-success";

    }else{

        alert(result.message);

    }

});

</script>

</body>
</html>
